name: PR Preview

on:
  pull_request:
    types:
      - opened
      - reopened
      - synchronize
      - closed

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: preview-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy-preview:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: latest

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          cache: pnpm

      - name: Install Dependencies
        if: github.event.action != 'closed'
        run: pnpm install

      - name: Build
        if: github.event.action != 'closed'
        env:
          BASE_PATH: /nextjs-pages-preview-action/pr-preview/pr-${{ github.event.number }}
        run: pnpm build

      - name: Add .nojekyll
        if: github.event.action != 'closed'
        run: touch ./out/.nojekyll

      - name: Deploy PR Preview 🚀
        uses: rossjrw/pr-preview-action@v1
        with:
          source-dir: ./out
          preview-branch: gh-pages
          umbrella-dir: pr-preview
          action: auto